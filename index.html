<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blokport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: black;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .fallback {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
        }
        
        .fallback h1 {
            font-size: 3rem;
            letter-spacing: 0.1em;
            font-weight: 300;
        }
        
        .fallback p {
            margin-top: 1rem;
            font-size: 1.2rem;
            opacity: 0.7;
        }
        
        /* Hide fallback when video is playing */
        .fallback.hide {
            display: none;
        }
    </style>
</head>
<body>
    <video id="bgVideo" autoplay muted loop playsinline>
        <source src="coming_soon_video.mov" type="video/quicktime">
        Your browser does not support the video tag.
    </video>
    
    <div id="fallback" class="fallback">
        <div>
            <h1>BLOKPORT</h1>
            <p>Coming Soon</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const fallback = document.getElementById('fallback');
        
        // If video fails to play, show fallback
        video.addEventListener('error', function() {
            fallback.classList.remove('hide');
        });
        
        // If video plays successfully, hide fallback
        video.addEventListener('canplay', function() {
            fallback.classList.add('hide');
        });
        
        // Also try to play and hide fallback if video works
        video.play().then(() => {
            fallback.classList.add('hide');
        }).catch(() => {
            fallback.classList.remove('hide');
        });
    </script>
</body>
</html>
