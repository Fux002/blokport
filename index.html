<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blokport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }
        
        /* Simple, reliable full-screen video */
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <video autoplay muted loop playsinline>
        <source src="coming_soon_video.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>
</body>
</html>
