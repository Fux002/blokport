<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blokport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
            cursor: pointer;
            transition: opacity 0.5s;
        }
        
        .overlay.hide {
            opacity: 0;
            pointer-events: none;
        }
        
        .play-button {
            text-align: center;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        
        .play-button h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 0.1em;
            font-weight: 300;
            margin-bottom: 1rem;
        }
        
        .play-button p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            opacity: 0.8;
            margin-bottom: 2rem;
        }
        
        .play-icon {
            font-size: 3rem;
            margin-top: 1rem;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }
        
        .fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            z-index: 5;
        }
        
        .fallback.hide {
            display: none;
        }
        
        .volume-hint {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 8px 12px;
            border-radius: 20px;
            font-family: sans-serif;
            font-size: 12px;
            z-index: 25;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1s;
        }
        
        .volume-hint.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="bgVideo" loop playsinline preload="auto">
            <source src="coming_soon_video.mov" type="video/quicktime">
            Your browser does not support the video tag.
        </video>
    </div>
    
    <div id="overlay" class="overlay">
        <div class="play-button">
            <h1>BLOKPORT</h1>
            <p>Coming Soon</p>
            <div class="play-icon">▶</div>
            <p style="font-size: 0.8rem; margin-top: 1rem;">Tap to play with sound</p>
        </div>
    </div>
    
    <div id="fallback" class="fallback hide">
        <div>
            <h1>BLOKPORT</h1>
            <p>Coming Soon</p>
        </div>
    </div>
    
    <div id="volumeHint" class="volume-hint">
        🔊 Sound enabled
    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const overlay = document.getElementById('overlay');
        const fallback = document.getElementById('fallback');
        const volumeHint = document.getElementById('volumeHint');
        
        let played = false;
        
        // Function to handle video sizing
        function adjustVideoSize() {
            if (!video.videoWidth) return;
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const videoAspect = video.videoWidth / video.videoHeight;
            const windowAspect = windowWidth / windowHeight;
            
            if (videoAspect > windowAspect) {
                video.style.width = '100%';
                video.style.height = 'auto';
            } else {
                video.style.width = 'auto';
                video.style.height = '100%';
            }
        }
        
        // Function to play video with sound
        function playVideo() {
            if (played) return;
            played = true;
            
            video.volume = 1.0;
            video.muted = false;
            
            video.play().then(() => {
                // Hide overlay with fade
                overlay.classList.add('hide');
                fallback.classList.add('hide');
                
                // Show volume hint
                volumeHint.classList.add('show');
                setTimeout(() => {
                    volumeHint.classList.remove('show');
                }, 3000);
            }).catch((error) => {
                console.log('Play failed:', error);
                fallback.classList.remove('hide');
            });
        }
        
        // Handle video loading
        video.addEventListener('canplay', function() {
            adjustVideoSize();
        });
        
        video.addEventListener('loadedmetadata', function() {
            adjustVideoSize();
        });
        
        // Adjust video on resize
        window.addEventListener('resize', function() {
            if (video && video.videoWidth) {
                adjustVideoSize();
            }
        });
        
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                if (video && video.videoWidth) {
                    adjustVideoSize();
                }
            }, 100);
        });
        
        // Play on any click/tap
        document.body.addEventListener('click', playVideo);
        document.body.addEventListener('touchstart', playVideo);
        
        // For debugging
        video.addEventListener('error', function(e) {
            console.log('Video error:', e);
            fallback.classList.remove('hide');
        });
    </script>
</body>
</html>
