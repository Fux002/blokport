<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blokport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Ensure full coverage on all devices */
        html {
            width: 100%;
            height: 100%;
        }
        
        body {
            background: black;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* Video container that fills the screen */
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* Video that scales correctly */
        .video-container video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
        }
        
        /* Fallback for older devices */
        .fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }
        
        .fallback h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 0.1em;
            font-weight: 300;
        }
        
        .fallback p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            margin-top: 1rem;
            opacity: 0.7;
        }
        
        .fallback.hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="bgVideo" autoplay muted loop playsinline preload="auto">
            <source src="coming_soon_video.mp4" type="video/mp4">
        </video>
    </div>
    
    <div id="fallback" class="fallback hide">
        <div>
            <h1>BLOKPORT</h1>
            <p>Coming Soon</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const fallback = document.getElementById('fallback');
        
        // Show fallback if video fails to load
        if (video) {
            video.addEventListener('error', function() {
                fallback.classList.remove('hide');
            });
            
            video.addEventListener('loadeddata', function() {
                fallback.classList.add('hide');
            });
        }
    </script>
</body>
</html>
