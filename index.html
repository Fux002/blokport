<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Blokport</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        video {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }
        
        /* For mobile devices that may have address bar issues */
        @media (max-width: 768px) {
            video {
                min-height: 100%;
                min-width: 100%;
            }
        }
        
        .fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }
        
        .fallback h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            letter-spacing: 0.1em;
            font-weight: 300;
            margin-bottom: 1rem;
        }
        
        .fallback p {
            font-size: clamp(1rem, 4vw, 1.2rem);
            opacity: 0.7;
        }
        
        .fallback.hide {
            display: none;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video id="bgVideo" autoplay muted loop playsinline preload="auto">
            <source src="coming_soon_video.mov" type="video/quicktime">
            Your browser does not support the video tag.
        </video>
    </div>
    
    <div id="fallback" class="fallback">
        <div>
            <h1>BLOKPORT</h1>
            <p>Coming Soon</p>
        </div>
    </div>

    <script>
        const video = document.getElementById('bgVideo');
        const fallback = document.getElementById('fallback');
        
        // Function to handle video sizing
        function adjustVideoSize() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            const videoAspect = video.videoWidth / video.videoHeight;
            const windowAspect = windowWidth / windowHeight;
            
            if (videoAspect > windowAspect) {
                video.style.width = '100%';
                video.style.height = 'auto';
            } else {
                video.style.width = 'auto';
                video.style.height = '100%';
            }
        }
        
        // Handle video loading and errors
        if (video) {
            video.addEventListener('error', function(e) {
                console.log('Video failed to load:', e);
                fallback.classList.remove('hide');
            });
            
            video.addEventListener('canplay', function() {
                fallback.classList.add('hide');
                adjustVideoSize();
            });
            
            video.addEventListener('loadedmetadata', function() {
                adjustVideoSize();
            });
            
            // Try to play
            video.play().then(() => {
                fallback.classList.add('hide');
            }).catch((error) => {
                console.log('Autoplay prevented:', error);
                fallback.classList.remove('hide');
            });
        } else {
            fallback.classList.remove('hide');
        }
        
        // Adjust video on window resize
        window.addEventListener('resize', function() {
            if (video && video.videoWidth) {
                adjustVideoSize();
            }
        });
        
        // Handle orientation change on mobile
        window.addEventListener('orientationchange', function() {
            setTimeout(function() {
                if (video && video.videoWidth) {
                    adjustVideoSize();
                }
            }, 100);
        });
    </script>
</body>
</html>
